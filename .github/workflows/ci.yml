name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: financial_martec
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d financial_martec"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/financial_martec?schema=public
      REDIS_URL: redis://localhost:6379/0
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/financial_martec?schema=api_integration
      REDIS_TEST_URL: redis://localhost:6379/15
      APP_PORT: 4000
      APP_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ci-access-secret-123456
      JWT_REFRESH_SECRET: ci-refresh-secret-123456
      INTERNAL_SYNC_SECRET: ci-internal-sync-123456
      PEDAGOGICAL_API_BASE_URL: https://api.oriztech.com
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      INTERNAL_API_BASE_URL: http://localhost:4000
      WORKER_API_BASE_URL: http://localhost:4000
      PEDAGOGICAL_USERNAME: ci-pedagogical-user
      PEDAGOGICAL_PASSWORD: ci-pedagogical-password
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @financial-martec/api prisma:generate

      - name: Apply migrations
        run: pnpm --filter @financial-martec/api prisma:migrate:deploy

      - name: Seed database
        run: pnpm --filter @financial-martec/api prisma:seed

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Integration Preflight
        run: pnpm --filter @financial-martec/api test:integration:preflight

      - name: Integration Test
        run: pnpm --filter @financial-martec/api test:integration
