name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/financial_martec
      REDIS_URL: redis://localhost:6379
      APP_PORT: 4000
      APP_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ci-access-secret-123456
      JWT_REFRESH_SECRET: ci-refresh-secret-123456
      INTERNAL_SYNC_SECRET: ci-internal-sync-123456
      PEDAGOGICAL_API_BASE_URL: https://api.oriztech.com
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      INTERNAL_API_BASE_URL: http://localhost:4000
      WORKER_API_BASE_URL: http://localhost:4000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @financial-martec/api prisma:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
