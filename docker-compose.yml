services:
  postgres:
    image: postgres:16-alpine
    container_name: financial-martec-postgres
    environment:
      POSTGRES_DB: financial_martec
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: financial-martec-redis
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: financial-martec-api
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: financial-martec-web
    depends_on:
      - api
    env_file:
      - .env
    ports:
      - '3000:3000'

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: financial-martec-worker
    depends_on:
      - api
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
